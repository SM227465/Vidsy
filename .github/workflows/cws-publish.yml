name: Chrome Web Store - Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Build, upload, and submit for review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build + zip
        run: pnpm zip

      - name: Resolve zip path
        id: zip
        run: echo "path=$(ls dist-zip/extension-*.zip | head -1)" >> "$GITHUB_OUTPUT"

      - name: Install upload-script deps
        # Run inside .github/scripts so npm doesn't trip over pnpm's
        # node_modules layout in the repo root.
        working-directory: .github/scripts
        run: npm install --no-package-lock

      - name: Upload + submit for review
        working-directory: .github/scripts
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          ZIP_PATH: ${{ github.workspace }}/${{ steps.zip.outputs.path }}
        run: node cws-upload.mjs
